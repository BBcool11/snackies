<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg007" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA07A;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bg007)" rx="30"/>
  
  <!-- 装饰形状 -->
  
  <g filter="url(#shadow)">
    <rect x="120" y="140" width="20" height="120" rx="10" fill="#FFA07A"/>
    <rect x="160" y="140" width="20" height="120" rx="10" fill="#FF7F50"/>
    <rect x="200" y="140" width="20" height="120" rx="10" fill="#FFA07A"/>
    <rect x="240" y="140" width="20" height="120" rx="10" fill="#FF7F50"/>
  </g>
  
  <!-- 图标 -->
  <text x="200" y="195" font-size="100" text-anchor="middle" dominant-baseline="central">🦐</text>
  
  <!-- 名称 -->
  <text x="200" y="330" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="28" font-weight="bold" text-anchor="middle" fill="#2d3748">虾条</text>
  
  <!-- 编号 -->
  <text x="200" y="365" font-family="monospace" font-size="14" text-anchor="middle" fill="#a0aec0">NO.007</text>
  
  <!-- 装饰点 -->
  <circle cx="50" cy="50" r="15" fill="#FFA07A" opacity="0.4"/>
  <circle cx="350" cy="50" r="10" fill="#FF7F50" opacity="0.3"/>
  <circle cx="50" cy="350" r="10" fill="#FF7F50" opacity="0.3"/>
  <circle cx="350" cy="350" r="15" fill="#FFA07A" opacity="0.4"/>
</svg>