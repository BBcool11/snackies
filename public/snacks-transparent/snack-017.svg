<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg017" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F4F4F;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bg017)" rx="30"/>
  
  <!-- 装饰形状 -->
  
  <g filter="url(#shadow)">
    <circle cx="200" cy="160" r="70" fill="#2F4F4F"/>
    <circle cx="200" cy="180" r="70" fill="#2F4F4F"/>
    <rect x="130" y="170" width="140" height="15" fill="white"/>
  </g>
  
  <!-- 图标 -->
  <text x="200" y="195" font-size="100" text-anchor="middle" dominant-baseline="central">🍪</text>
  
  <!-- 名称 -->
  <text x="200" y="330" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="28" font-weight="bold" text-anchor="middle" fill="#2d3748">奥利奥</text>
  
  <!-- 编号 -->
  <text x="200" y="365" font-family="monospace" font-size="14" text-anchor="middle" fill="#a0aec0">NO.017</text>
  
  <!-- 装饰点 -->
  <circle cx="50" cy="50" r="15" fill="#2F4F4F" opacity="0.4"/>
  <circle cx="350" cy="50" r="10" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="50" cy="350" r="10" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="350" cy="350" r="15" fill="#2F4F4F" opacity="0.4"/>
</svg>