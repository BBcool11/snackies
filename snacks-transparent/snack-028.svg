<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>
  
  <!-- 装饰圆 -->
  <circle cx="200" cy="180" r="120" fill="#FFFFFF" opacity="0.2" filter="url(#shadow)"/>
  <circle cx="200" cy="180" r="90" fill="#FFFFFF" opacity="0.1"/>
  
  <!-- 图标 -->
  <text x="200" y="200" font-size="120" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">🍬</text>
  
  <!-- 零食名称 -->
  <text x="200" y="340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="600" 
        text-anchor="middle" fill="#333333">大白兔奶糖</text>
  
  <!-- 编号 -->
  <text x="200" y="370" font-family="monospace" font-size="14" 
        text-anchor="middle" fill="#999999">#028</text>
  
  <!-- 角落装饰 -->
  <circle cx="40" cy="40" r="20" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="360" cy="360" r="20" fill="#FFFFFF" opacity="0.3"/>
</svg>